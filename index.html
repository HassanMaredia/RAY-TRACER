<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Simple Path Tracer - Working Demo</title>
    <style>
        body {
            background: #0a0c12;
            font-family: 'Segoe UI', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        .container {
            background: #111318;
            border-radius: 32px;
            padding: 20px;
        }
        .canvas-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        canvas {
            display: block;
            border-radius: 20px;
            background: #000;
            width: 800px;
            height: 450px;
            border: 1px solid #2c2f3c;
        }
        .controls {
            background: rgba(20, 22, 32, 0.8);
            border-radius: 24px;
            padding: 18px 22px;
            min-width: 260px;
        }
        .controls h3 {
            margin: 0 0 12px 0;
            color: #eef;
        }
        .control-group {
            margin-bottom: 18px;
        }
        label {
            display: flex;
            justify-content: space-between;
            color: #bbc;
            margin-bottom: 8px;
        }
        input, select {
            width: 100%;
            background: #1e202c;
            border: 1px solid #2c2f3c;
            color: #f0f0f0;
            padding: 8px 12px;
            border-radius: 14px;
        }
        button {
            background: #5f7ef2;
            border: none;
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 6px;
        }
        .stats {
            margin-top: 16px;
            font-size: 0.75rem;
            background: #0b0d14;
            padding: 10px;
            border-radius: 18px;
            color: #9aa6cf;
        }
        .stats p {
            margin: 4px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="canvas-panel">
        <canvas id="renderCanvas" width="800" height="450"></canvas>
        <div class="controls">
            <h3>🔆 Path Tracer</h3>
            <div class="control-group">
                <label>Samples <span id="samplesValue">8</span></label>
                <input type="range" id="samplesSlider" min="1" max="64" step="1" value="8">
            </div>
            <div class="control-group">
                <label>Bounces <span id="bouncesValue">3</span></label>
                <input type="range" id="bouncesSlider" min="1" max="5" step="1" value="3">
            </div>
            <button id="resetBtn">⟳ RESTART</button>
            <div class="stats">
                <p>🎯 Sample: <span id="currentSamples">0</span>/<span id="targetSamples">8</span></p>
                <p>📊 Status: <span id="status">Starting...</span></p>
            </div>
        </div>
    </div>
</div>

<script>
    // Get elements
    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');
    const width = 800;
    const height = 450;
    
    // Set canvas size
    canvas.width = width;
    canvas.height = height;
    
    // State
    let currentSample = 0;
    let targetSamples = 8;
    let maxBounces = 3;
    let rendering = true;
    
    // Accumulation buffer
    let accumR = new Array(width * height).fill(0);
    let accumG = new Array(width * height).fill(0);
    let accumB = new Array(width * height).fill(0);
    
    // UI elements
    const samplesSlider = document.getElementById('samplesSlider');
    const samplesValue = document.getElementById('samplesValue');
    const bouncesSlider = document.getElementById('bouncesSlider');
    const bouncesValue = document.getElementById('bouncesValue');
    const resetBtn = document.getElementById('resetBtn');
    const currentSamplesSpan = document.getElementById('currentSamples');
    const targetSamplesSpan = document.getElementById('targetSamples');
    const statusSpan = document.getElementById('status');
    
    // Simple random
    function random() {
        return Math.random();
    }
    
    // Vector operations
    function add(a, b) { return [a[0] + b[0], a[1] + b[1], a[2] + b[2]]; }
    function sub(a, b) { return [a[0] - b[0], a[1] - b[1], a[2] - b[2]]; }
    function mul(v, t) { return [v[0] * t, v[1] * t, v[2] * t]; }
    function dot(a, b) { return a[0]*b[0] + a[1]*b[1] + a[2]*b[2]; }
    function normalize(v) {
        const len = Math.sqrt(v[0]*v[0] + v[1]*v[1] + v[2]*v[2]);
        return [v[0]/len, v[1]/len, v[2]/len];
    }
    
    // Scene: Simple spheres on a plane
    const scene = {
        spheres: [
            // Red sphere
            { center: [-0.8, -0.3, 1.2], radius: 0.5, color: [1.0, 0.2, 0.2], type: 'diffuse' },
            // Green sphere  
            { center: [0.8, -0.3, 1.2], radius: 0.5, color: [0.2, 1.0, 0.2], type: 'diffuse' },
            // Blue sphere
            { center: [0, 0.2, 0.8], radius: 0.4, color: [0.2, 0.2, 1.0], type: 'diffuse' },
            // Metal sphere
            { center: [0, -0.7, 0.6], radius: 0.35, color: [0.9, 0.9, 0.9], type: 'metal', roughness: 0.1 }
        ],
        plane: {
            y: -0.9,
            color: [0.6, 0.6, 0.6],
            type: 'diffuse'
        },
        light: {
            position: [0, 2.0, 1.0],
            color: [12, 12, 10],
            intensity: 1.5
        }
    };
    
    // Intersect sphere
    function intersectSphere(ro, rd, sphere) {
        const oc = sub(ro, sphere.center);
        const a = dot(rd, rd);
        const b = 2 * dot(oc, rd);
        const c = dot(oc, oc) - sphere.radius * sphere.radius;
        const disc = b*b - 4*a*c;
        if (disc < 0) return Infinity;
        let t = (-b - Math.sqrt(disc)) / (2*a);
        if (t < 0.001) t = (-b + Math.sqrt(disc)) / (2*a);
        return t > 0.001 ? t : Infinity;
    }
    
    // Intersect plane
    function intersectPlane(ro, rd, planeY) {
        if (Math.abs(rd[1]) < 1e-6) return Infinity;
        const t = (planeY - ro[1]) / rd[1];
        return t > 0.001 ? t : Infinity;
    }
    
    // Trace ray
    function trace(ro, rd, depth) {
        if (depth <= 0) return [0, 0, 0];
        
        let hitT = Infinity;
        let hitObj = null;
        let hitPoint = [0,0,0];
        let hitNormal = [0,0,0];
        
        // Check spheres
        for (let i = 0; i < scene.spheres.length; i++) {
            const sphere = scene.spheres[i];
            const t = intersectSphere(ro, rd, sphere);
            if (t < hitT) {
                hitT = t;
                hitObj = sphere;
                hitPoint = add(ro, mul(rd, t));
                hitNormal = normalize(sub(hitPoint, sphere.center));
            }
        }
        
        // Check plane
        const planeT = intersectPlane(ro, rd, scene.plane.y);
        if (planeT < hitT) {
            hitT = planeT;
            hitObj = scene.plane;
            hitPoint = add(ro, mul(rd, planeT));
            hitNormal = [0, 1, 0];
        }
        
        // Background (sky gradient)
        if (hitT === Infinity) {
            const t = 0.5 * (rd[1] + 1);
            return [0.4*t, 0.6*t, 0.8*t];
        }
        
        // Lighting
        const lightPos = scene.light.position;
        const lightColor = scene.light.color;
        const lightIntensity = scene.light.intensity;
        
        // Calculate light contribution
        const toLight = sub(lightPos, hitPoint);
        const lightDir = normalize(toLight);
        const lightDist = Math.sqrt(dot(toLight, toLight));
        
        // Shadow ray
        const shadowRay = lightDir;
        let inShadow = false;
        
        // Check shadow against spheres
        for (let i = 0; i < scene.spheres.length; i++) {
            if (scene.spheres[i] === hitObj) continue;
            const t = intersectSphere(hitPoint, shadowRay, scene.spheres[i]);
            if (t < lightDist && t > 0.01) {
                inShadow = true;
                break;
            }
        }
        
        // Check shadow against plane
        if (!inShadow) {
            const planeTShadow = intersectPlane(hitPoint, shadowRay, scene.plane.y);
            if (planeTShadow < lightDist && planeTShadow > 0.01) {
                inShadow = true;
            }
        }
        
        let lightContrib = [0, 0, 0];
        if (!inShadow) {
            const ndotl = Math.max(0, dot(hitNormal, lightDir));
            const attenuation = 1.0 / (lightDist * lightDist);
            const intensity = ndotl * attenuation * lightIntensity;
            lightContrib = mul(lightColor, intensity);
        }
        
        // Get material color
        let albedo = hitObj.color;
        
        // Diffuse reflection
        if (hitObj.type === 'diffuse') {
            // Cosine-weighted hemisphere sampling
            const u = random() * 2 * Math.PI;
            const v = random();
            const r = Math.sqrt(v);
            const px = r * Math.cos(u);
            const py = r * Math.sin(u);
            const pz = Math.sqrt(1 - v);
            
            // Build tangent space
            let nx = hitNormal[0], ny = hitNormal[1], nz = hitNormal[2];
            let ux = Math.abs(nx) > 0.9 ? 1 : 0;
            let uy = Math.abs(nx) > 0.9 ? 0 : 1;
            let uz = 0;
            let tx = uy*nz - uz*ny;
            let ty = uz*nx - ux*nz;
            let tz = ux*ny - uy*nx;
            const tlen = Math.sqrt(tx*tx + ty*ty + tz*tz);
            tx /= tlen; ty /= tlen; tz /= tlen;
            let bx = ny*tz - nz*ty;
            let by = nz*tx - nx*tz;
            let bz = nx*ty - ny*tx;
            
            const dirX = tx*px + bx*py + nx*pz;
            const dirY = ty*px + by*py + ny*pz;
            const dirZ = tz*px + bz*py + nz*pz;
            const dirLen = Math.sqrt(dirX*dirX + dirY*dirY + dirZ*dirZ);
            const newDir = [dirX/dirLen, dirY/dirLen, dirZ/dirLen];
            
            const bounceColor = trace(hitPoint, newDir, depth - 1);
            return [
                lightContrib[0] + albedo[0] * bounceColor[0],
                lightContrib[1] + albedo[1] * bounceColor[1],
                lightContrib[2] + albedo[2] * bounceColor[2]
            ];
        }
        
        // Metal reflection
        if (hitObj.type === 'metal') {
            const dot = rd[0]*hitNormal[0] + rd[1]*hitNormal[1] + rd[2]*hitNormal[2];
            let reflected = [
                rd[0] - 2*dot*hitNormal[0],
                rd[1] - 2*dot*hitNormal[1],
                rd[2] - 2*dot*hitNormal[2]
            ];
            
            // Roughness
            const roughness = hitObj.roughness || 0;
            reflected[0] += (random() - 0.5) * roughness;
            reflected[1] += (random() - 0.5) * roughness;
            reflected[2] += (random() - 0.5) * roughness;
            const refLen = Math.sqrt(reflected[0]*reflected[0] + reflected[1]*reflected[1] + reflected[2]*reflected[2]);
            reflected[0] /= refLen;
            reflected[1] /= refLen;
            reflected[2] /= refLen;
            
            const bounceColor = trace(hitPoint, reflected, depth - 1);
            return [
                lightContrib[0] + albedo[0] * bounceColor[0],
                lightContrib[1] + albedo[1] * bounceColor[1],
                lightContrib[2] + albedo[2] * bounceColor[2]
            ];
        }
        
        return lightContrib;
    }
    
    // Render a single sample
    function renderSample() {
        // Camera
        const camPos = [0, 0.3, 2.8];
        const camTarget = [0, 0, 0.5];
        const camUp = [0, 1, 0];
        
        // Camera basis
        let dirZ = normalize(sub(camTarget, camPos));
        let dirX = normalize(cross(camUp, dirZ));
        let dirY = cross(dirZ, dirX);
        
        const aspect = width / height;
        const fovScale = Math.tan(50 * Math.PI / 180 * 0.5);
        
        for (let y = 0; y < height; y++) {
            for (let x = 0; x < width; x++) {
                // Anti-aliasing jitter
                const jitterX = random() - 0.5;
                const jitterY = random() - 0.5;
                
                const u = (2 * (x + jitterX) / width - 1) * fovScale * aspect;
                const v = (1 - 2 * (y + jitterY) / height) * fovScale;
                
                let rdX = dirX[0]*u + dirY[0]*v + dirZ[0];
                let rdY = dirX[1]*u + dirY[1]*v + dirZ[1];
                let rdZ = dirX[2]*u + dirY[2]*v + dirZ[2];
                const rdLen = Math.sqrt(rdX*rdX + rdY*rdY + rdZ*rdZ);
                const rd = [rdX/rdLen, rdY/rdLen, rdZ/rdLen];
                
                const color = trace(camPos, rd, maxBounces);
                
                const idx = y * width + x;
                const invSamples = 1.0 / (currentSample + 1);
                accumR[idx] = (accumR[idx] * currentSample + color[0]) * invSamples;
                accumG[idx] = (accumG[idx] * currentSample + color[1]) * invSamples;
                accumB[idx] = (accumB[idx] * currentSample + color[2]) * invSamples;
            }
        }
    }
    
    function cross(a, b) {
        return [
            a[1]*b[2] - a[2]*b[1],
            a[2]*b[0] - a[0]*b[2],
            a[0]*b[1] - a[1]*b[0]
        ];
    }
    
    // Display the image
    function display() {
        const imageData = ctx.createImageData(width, height);
        const data = imageData.data;
        
        for (let i = 0; i < width * height; i++) {
            let r = accumR[i];
            let g = accumG[i];
            let b = accumB[i];
            
            // Tone mapping (Reinhard)
            r = r / (1 + r);
            g = g / (1 + g);
            b = b / (1 + b);
            
            // Gamma correction
            data[i*4] = Math.pow(r, 1/2.2) * 255;
            data[i*4+1] = Math.pow(g, 1/2.2) * 255;
            data[i*4+2] = Math.pow(b, 1/2.2) * 255;
            data[i*4+3] = 255;
        }
        
        ctx.putImageData(imageData, 0, 0);
    }
    
    // Render loop using setTimeout for responsiveness
    let renderTimeout = null;
    
    function renderLoop() {
        if (!rendering) return;
        
        const start = performance.now();
        renderSample();
        currentSample++;
        
        display();
        currentSamplesSpan.textContent = currentSample;
        
        if (currentSample < targetSamples) {
            const percent = Math.round(currentSample / targetSamples * 100);
            statusSpan.textContent = `${percent}%`;
            // Use setTimeout to keep UI responsive
            renderTimeout = setTimeout(renderLoop, 10);
        } else {
            statusSpan.textContent = 'Complete!';
            renderTimeout = null;
        }
    }
    
    function resetRender() {
        if (renderTimeout) {
            clearTimeout(renderTimeout);
            renderTimeout = null;
        }
        
        rendering = false;
        
        // Reset buffers
        for (let i = 0; i < width * height; i++) {
            accumR[i] = 0;
            accumG[i] = 0;
            accumB[i] = 0;
        }
        
        currentSample = 0;
        currentSamplesSpan.textContent = '0';
        statusSpan.textContent = '0%';
        
        // Clear canvas
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, width, height);
        
        rendering = true;
        renderLoop();
    }
    
    // Event listeners
    samplesSlider.addEventListener('input', () => {
        targetSamples = parseInt(samplesSlider.value);
        samplesValue.textContent = targetSamples;
        targetSamplesSpan.textContent = targetSamples;
        resetRender();
    });
    
    bouncesSlider.addEventListener('input', () => {
        maxBounces = parseInt(bouncesSlider.value);
        bouncesValue.textContent = maxBounces;
        resetRender();
    });
    
    resetBtn.addEventListener('click', () => {
        resetRender();
    });
    
    // Start
    targetSamplesSpan.textContent = targetSamples;
    samplesValue.textContent = targetSamples;
    bouncesValue.textContent = maxBounces;
    resetRender();
</script>
</body>
</html>
